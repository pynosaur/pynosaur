name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch tool READMEs
        run: |
          python3 -c "
          import urllib.request, re, pathlib

          yml = pathlib.Path('_data/tools.yml').read_text()
          tools = []
          cur = {}
          for line in yml.split('\n'):
              m = re.match(r'^-?\s*name:\s*(.+)', line.strip())
              if m:
                  cur = {'name': m.group(1).strip()}
              m = re.match(r'description:\s*(.+)', line.strip())
              if m and cur:
                  cur['desc'] = m.group(1).strip()
                  tools.append(cur)
                  cur = {}

          raw_open = '{' + '% raw %' + '}'
          raw_close = '{' + '% endraw %' + '}'
          for t in tools:
              name = t['name']
              desc = t.get('desc', name)
              title = f'{name} - {desc}'
              url = f'https://raw.githubusercontent.com/pynosaur/{name}/main/README.md'
              try:
                  readme = urllib.request.urlopen(url).read().decode()
                  print(f'{name}: {len(readme)} bytes')
              except Exception as e:
                  readme = f'Could not load documentation. [View on GitHub](https://github.com/pynosaur/{name}#readme)'
                  print(f'{name}: FAILED ({e})')
              page = '---\n'
              page += 'layout: default\n'
              page += f'title: \"{title}\"\n'
              page += f'permalink: /{name}/\n'
              page += '---\n\n'
              page += raw_open + '\n'
              page += readme + '\n'
              page += raw_close + '\n'
              with open(f'pages/{name}.md', 'w') as f:
                  f.write(page)
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

