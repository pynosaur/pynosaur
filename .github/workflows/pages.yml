name: Deploy GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch tool READMEs
        run: |
          python3 -c "
          import urllib.request, os
          tools = {
              'pget': 'pget - Package Manager',
              'see': 'see - File Viewer',
              'purl': 'purl - URL Transfer Tool',
              'yday': 'yday - Day of Year',
              'doc': 'doc - Documentation Viewer',
              'sock': 'sock - Socket Communication',
              'path': 'path - File Finder',
              'plack': 'plack - Python Linter',
              'pyle': 'pyle - Disk Usage Explorer',
          }
          raw_open = '{' + '% raw %' + '}'
          raw_close = '{' + '% endraw %' + '}'
          for tool, title in tools.items():
              url = f'https://raw.githubusercontent.com/pynosaur/{tool}/main/README.md'
              try:
                  readme = urllib.request.urlopen(url).read().decode()
                  print(f'{tool}: {len(readme)} bytes')
              except Exception as e:
                  readme = f'Could not load documentation. [View on GitHub](https://github.com/pynosaur/{tool}#readme)'
                  print(f'{tool}: FAILED ({e})')
              page = '---\n'
              page += 'layout: default\n'
              page += f'title: \"{title}\"\n'
              page += f'permalink: /{tool}/\n'
              page += '---\n\n'
              page += raw_open + '\n'
              page += readme + '\n'
              page += raw_close + '\n'
              with open(f'pages/{tool}.md', 'w') as f:
                  f.write(page)
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

